name: Build togetherly.exe

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download dependencies
        working-directory: client
        run: go mod tidy

      - name: Build Windows .exe
        working-directory: client
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o togetherly.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: togetherly-windows
          path: client/togetherly.exe
